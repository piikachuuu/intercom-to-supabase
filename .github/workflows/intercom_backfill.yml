name: Intercom Replies Backfill

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "How many replies rows to scan in this run"
        required: false
        default: "5000"
      offset:
        description: "Offset into replies table"
        required: false
        default: "0"
      concurrency:
        description: "Intercom fetch concurrency"
        required: false
        default: "2"
      sleep_ms:
        description: "Sleep ms between Intercom requests per worker"
        required: false
        default: "300"

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INTERCOM_ACCESS_TOKEN: ${{ secrets.INTERCOM_ACCESS_TOKEN }}
          LIMIT_CONVERSATIONS: ${{ github.event.inputs.limit }}
          OFFSET_CONVERSATIONS: ${{ github.event.inputs.offset }}
          INTERCOM_CONCURRENCY: ${{ github.event.inputs.concurrency }}
          INTERCOM_SLEEP_MS: ${{ github.event.inputs.sleep_ms }}
        run: node scripts/intercom_backfill_replies.mjs
